{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixSoftMoney — Portefeuille Web3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%230a0a1a' stroke='%236c63ff' stroke-width='3'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%236c63ff' stroke-width='2' stroke-dasharray='8 4'/%3E%3Cpath d='M42,32 L42,68 L50,68 L50,54 L58,54 Q66,54 66,43 Q66,32 58,32 Z M50,40 L56,40 Q59,40 59,43 Q59,46 56,46 L50,46 Z' fill='%236c63ff'/%3E%3Ccircle cx='50' cy='12' r='3' fill='%236c63ff' opacity='.5'/%3E%3Ccircle cx='88' cy='50' r='3' fill='%236c63ff' opacity='.5'/%3E%3Ccircle cx='50' cy='88' r='3' fill='%236c63ff' opacity='.5'/%3E%3Ccircle cx='12' cy='50' r='3' fill='%236c63ff' opacity='.5'/%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
a{color:#6c63ff;text-decoration:none}

.pp-nav{background:rgba(10,10,26,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(108,99,255,.15);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.pp-nav-brand{font-size:1.2rem;font-weight:700;color:#6c63ff;display:flex;align-items:center;gap:8px}
.pp-nav-brand .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6c63ff,#a855f7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.pp-nav a{color:#888;font-size:.85rem;transition:color .2s}
.pp-nav a:hover,.pp-nav a.active{color:#6c63ff}
.pp-nav-links{display:flex;gap:16px;align-items:center}

.pp-wrap{max-width:860px;margin:0 auto;padding:24px 20px}

.pp-card{background:rgba(18,18,42,.8);border:1px solid rgba(108,99,255,.1);border-radius:20px;padding:28px;margin-bottom:18px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.pp-card h2{margin-bottom:18px;font-size:1.15rem}

.pp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.pp-stat{background:rgba(18,18,42,.9);border:1px solid rgba(108,99,255,.1);border-radius:20px;padding:22px;text-align:center}
.pp-stat .val{font-size:2rem;font-weight:700;color:#6c63ff}
.pp-stat .lbl{font-size:.82rem;color:#888;margin-top:4px}

.pp-form-group{margin-bottom:16px}
.pp-form-group label{display:block;margin-bottom:6px;font-size:.88rem;color:#888}
.pp-form-group input,.pp-form-group select,.pp-form-group textarea{width:100%;padding:12px 16px;background:rgba(10,10,26,.6);border:1px solid rgba(108,99,255,.15);border-radius:14px;color:#e0e0e0;font-size:.95rem;font-family:inherit;outline:none;transition:border .2s,box-shadow .2s}
.pp-form-group input:focus,.pp-form-group select:focus{border-color:#6c63ff;box-shadow:0 0 0 3px rgba(108,99,255,.1)}

.pp-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:14px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.pp-btn:active{transform:scale(.97)}
.pp-btn-primary{background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff}
.pp-btn-primary:hover{box-shadow:0 4px 20px rgba(108,99,255,.4)}
.pp-btn-success{background:linear-gradient(135deg,#00c853,#69f0ae);color:#000}
.pp-btn-danger{background:linear-gradient(135deg,#ff1744,#ff616f);color:#fff}
.pp-btn-outline{background:transparent;border:1px solid rgba(108,99,255,.2);color:#e0e0e0;border-radius:14px}
.pp-btn-outline:hover{background:rgba(108,99,255,.1);border-color:#6c63ff}

.pp-qr-box{text-align:center;padding:28px;background:#fff;border-radius:20px;margin:18px auto;max-width:320px;display:inline-block}

.pp-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600}
.pp-badge-en_attente{background:rgba(255,171,0,.12);color:#ffab00}
.pp-badge-confirme{background:rgba(0,200,83,.12);color:#00c853}
.pp-badge-refuse{background:rgba(255,23,68,.12);color:#ff1744}
.pp-badge-annule{background:rgba(136,136,136,.12);color:#888}

.pp-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 14px;text-align:left;border-bottom:1px solid rgba(108,99,255,.08);font-size:.88rem}
th{color:#888;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
tr:hover{background:rgba(108,99,255,.04)}

.pp-pay-page{max-width:460px;margin:40px auto;text-align:center}
.pp-pay-page .amount{font-size:2.6rem;font-weight:700;background:linear-gradient(135deg,#6c63ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
.pp-pay-page .merchant{font-size:1.05rem;color:#888;margin-bottom:24px}

.pp-flex{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pp-error{color:#ff1744;margin-bottom:12px}
.pp-empty{text-align:center;padding:40px;color:#888}
.pp-loading{text-align:center;padding:40px;color:#888}

.pp-glow{box-shadow:0 0 40px rgba(108,99,255,.08)}
</style>
</head>
<body>

<nav class="pp-nav">
  <a href="/pixsoftpay/" class="pp-nav-brand">
    <span class="logo-icon">₮</span>
    PixSoftMoney
  </a>
  <div class="pp-nav-links">
    <a href="/pixsoftpay/" class="{% if request.resolver_match.url_name == 'pixsoftpay_dashboard' %}active{% endif %}">Dashboard</a>
    <a href="/blockchain/" class="{% if 'blockchain' in request.path %}active{% endif %}">⛓️ Chain</a>
    <a href="/tokenomics/" class="{% if 'tokenomics' in request.path %}active{% endif %}">📊 Token</a>
    <a href="/governance/" class="{% if 'governance' in request.path %}active{% endif %}">🏛️ Vote</a>
    <a href="/staking/" class="{% if 'staking' in request.path %}active{% endif %}">🔒 Stake</a>
    <a href="/pixsoftpay/create/" class="{% if request.resolver_match.url_name == 'pixsoftpay_create' %}active{% endif %}">Nouveau QR</a>
    <a href="/pixsoftpay/wallet/" class="{% if request.resolver_match.url_name == 'pixsoftpay_wallet' %}active{% endif %}">Wallet</a>
    <a href="/pixsoftpay/history/" class="{% if request.resolver_match.url_name == 'pixsoftpay_history' %}active{% endif %}">Historique</a>
    <a href="/pixsoftpay/referral/" class="{% if request.resolver_match.url_name == 'pixsoftpay_referral' %}active{% endif %}">Parrainage</a>
    <a href="/pixsoftpay/kyc/" class="{% if request.resolver_match.url_name == 'pixsoftpay_kyc' %}active{% endif %}">Vérification</a>
    <a href="/">← Site</a>
  </div>
</nav>

<div class="pp-wrap">
{% block content %}{% endblock %}
</div>

</body>
</html>
