upstream django {
    server web:8000;
}

# ─── pixelsoftwaredesign.xyz (primary) ───
server {
    listen 80;
    server_name pixelsoftwaredesign.xyz www.pixelsoftwaredesign.xyz;

    client_max_body_size 20M;

    # PixSoftPay routes → Django
    location /pixsoftpay/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Firebase static site
    location / {
        root /app/firebase;
        try_files $uri $uri/ @django;
    }

    location @django {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /favicon.ico {
        root /app/firebase;
        access_log off;
        log_not_found off;
    }
}

# ─── Default (fallback) ───
server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 20M;

    location /pixsoftpay/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /app/firebase;
        try_files $uri $uri/ @django;
    }

    location @django {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /favicon.ico {
        root /app/firebase;
        access_log off;
        log_not_found off;
    }
}
