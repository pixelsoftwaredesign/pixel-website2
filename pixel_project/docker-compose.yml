services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: pixel_db
      POSTGRES_USER: pixel_user
      POSTGRES_PASSWORD: pixel_secret_2024
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixel_user -d pixel_db"]
      interval: 5s
      retries: 5

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: pixel_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_secret_2024
      MONGO_INITDB_DATABASE: pixel_social
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DJANGO_SECRET_KEY: 'django-insecure-docker-prod-change-me!'
      DJANGO_DEBUG: 'False'
      DJANGO_ALLOWED_HOSTS: '*'
      DATABASE_URL: postgres://pixel_user:pixel_secret_2024@db:5432/pixel_db
      MONGODB_URI: mongodb://pixel_admin:mongo_secret_2024@mongodb:27017/pixel_social?authSource=admin
      SITE_URL: 'http://localhost:80'
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      db:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - ../firebase-export:/app/firebase:ro
    depends_on:
      - web

volumes:
  pgdata:
  mongodata:
  static_files:
  media_files:
