<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixSoftPay — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
a{color:#6c63ff;text-decoration:none}
.pp-nav{background:#12122a;border-bottom:1px solid #1e1e3a;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.pp-nav-brand{font-size:1.3rem;font-weight:700;color:#6c63ff}
.pp-nav-links{display:flex;gap:16px;align-items:center}
.pp-nav-links a{color:#888;font-size:.88rem;transition:color .2s}
.pp-nav-links a:hover,.pp-nav-links a.active{color:#6c63ff}
.pp-nav-user{color:#00c853;font-weight:600}
.pp-nav-logout{background:none;border:1px solid #1e1e3a;color:#888;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:inherit}
.pp-nav-logout:hover{color:#ff1744;border-color:#ff1744}
.pp-wrap{max-width:860px;margin:0 auto;padding:24px 20px}
.pp-card{background:#12122a;border:1px solid #1e1e3a;border-radius:14px;padding:28px;margin-bottom:18px}
.pp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:24px}
.pp-stat{background:#12122a;border:1px solid #1e1e3a;border-radius:14px;padding:22px;text-align:center}
.pp-stat .val{font-size:2rem;font-weight:700;color:#6c63ff}
.pp-stat .lbl{font-size:.82rem;color:#888;margin-top:4px}
.pp-btn{display:inline-flex;padding:11px 22px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit}
.pp-btn-primary{background:#6c63ff;color:#fff}
.pp-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600}
.pp-badge-en_attente{background:rgba(255,171,0,.15);color:#ffab00}
.pp-badge-confirme{background:rgba(0,200,83,.15);color:#00c853}
.pp-badge-refuse{background:rgba(255,23,68,.15);color:#ff1744}
.pp-table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid #1e1e3a;font-size:.88rem}
th{color:#888;font-weight:600;font-size:.78rem;text-transform:uppercase}
tr:hover{background:#16162e}
.pp-flex{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.pp-loading{text-align:center;padding:40px;color:#888}
.pp-empty{text-align:center;padding:40px;color:#888}
</style>
</head>
<body>
<div id="app" style="display:none">
<nav class="pp-nav">
  <a href="/pixsoftpay/" class="pp-nav-brand">PixSoftPay</a>
  <div class="pp-nav-links">
    <a href="/pixsoftpay/" class="active">Dashboard</a>
    <a href="/pixsoftpay/create/">Nouveau QR</a>
    <a href="/pixsoftpay/wallet/">Wallet</a>
    <a href="/pixsoftpay/history/">Historique</a>
    <span class="pp-nav-user" id="username"></span>
    <button class="pp-nav-logout" onclick="logout()">Déconnexion</button>
    <a href="/">← Site</a>
  </div>
</nav>
<div class="pp-wrap">
  <h1 style="margin-bottom:24px">Dashboard PixSoftPay</h1>
  <div id="stats" class="pp-grid"><div class="pp-loading">Chargement...</div></div>
  <div class="pp-card">
    <div class="pp-flex" style="margin-bottom:18px">
      <h2 style="margin:0">Transactions récentes</h2>
      <a href="/pixsoftpay/create/"><button class="pp-btn pp-btn-primary">+ Nouveau QR</button></a>
    </div>
    <div id="recent"><div class="pp-loading">Chargement...</div></div>
  </div>
</div>
</div>
<script>
const API='https://pixel-website2-production.up.railway.app';
function getCookie(n){const m=document.cookie.match(new RegExp('(^| )'+n+'=([^;]+)'));return m?m[2]:'';}
function logout(){fetch(API+'/api/deconnexion/',{credentials:'include'}).then(()=>window.location='https://pixel-website2-production.up.railway.app/pixsoftpay/login/');}
fetch(API+'/api/me/',{credentials:'include'}).then(r=>r.json()).then(d=>{
  if(d.status!=='success'||!d.user){window.location='https://pixel-website2-production.up.railway.app/pixsoftpay/login/';return;}
  document.getElementById('username').textContent=d.user.username;
  document.getElementById('app').style.display='block';
  fetch(API+'/api/pixsoftpay/stats/',{credentials:'include'}).then(r=>r.json()).then(s=>{
    document.getElementById('stats').innerHTML=`
      <div class="pp-stat"><div class="val">${s.total||0}</div><div class="lbl">Total</div></div>
      <div class="pp-stat"><div class="val" style="color:#00c853">${s.paid||0}</div><div class="lbl">Payées</div></div>
      <div class="pp-stat"><div class="val" style="color:#ffab00">${s.pending||0}</div><div class="lbl">En attente</div></div>
      <div class="pp-stat"><div class="val">${(s.revenue||0).toFixed(2)}</div><div class="lbl">Revenu (TND)</div></div>`;
  });
  fetch(API+'/api/pixsoftpay/create/',{credentials:'include'}).then(r=>r.json()).then(d2=>{
    const txs=d2.payments||[];
    if(!txs.length){document.getElementById('recent').innerHTML='<div class="pp-empty">Aucune transaction</div>';return;}
    let h='<div class="pp-table-wrap"><table><thead><tr><th>Référence</th><th>Montant</th><th>Statut</th><th>Date</th></tr></thead><tbody>';
    txs.slice(0,10).forEach(p=>{h+=`<tr><td style="font-family:monospace">${p.reference}</td><td><strong>${p.amount} TND</strong></td><td><span class="pp-badge pp-badge-${p.status}">${p.status}</span></td><td>${new Date(p.created_at).toLocaleDateString('fr-FR')}</td></tr>`;});
    h+='</tbody></table></div>';
    document.getElementById('recent').innerHTML=h;
  }).catch(()=>{document.getElementById('recent').innerHTML='<div class="pp-empty">Aucune transaction</div>';});
});
</script>
</body>
</html>
