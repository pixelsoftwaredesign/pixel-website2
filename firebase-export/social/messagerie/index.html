<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Messagerie E2E — PixSocial | Pixel Software Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
.ps-msg-layout{display:grid;grid-template-columns:320px 1fr;gap:0;max-width:1100px;margin:0 auto;height:calc(100vh - 60px);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-top:1rem}
.ps-msg-list{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column}
.ps-msg-list-header{padding:1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ps-msg-list-header h2{font-size:1rem;margin:0}
.ps-msg-list-items{flex:1;overflow-y:auto}
.ps-msg-item{display:flex;align-items:center;gap:.8rem;padding:1rem 1.2rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .2s}
.ps-msg-item:hover,.ps-msg-item.active{background:rgba(30,180,130,.08)}
.ps-msg-item .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#1A9BAF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#000;flex-shrink:0}
.ps-msg-item .info{flex:1;min-width:0}
.ps-msg-item .info .name{font-weight:600;font-size:.85rem}
.ps-msg-item .info .preview{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-msg-item .info .time{font-size:.65rem;color:var(--muted)}
.ps-msg-item .type-badge{font-size:.6rem;background:rgba(30,180,130,.15);color:var(--accent);padding:2px 6px;border-radius:10px}
.ps-msg-main{display:flex;flex-direction:column;background:var(--bg)}
.ps-msg-main-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;padding:2rem}
.ps-chat-header{background:var(--card);border-bottom:1px solid var(--border);padding:.8rem 1.2rem;display:flex;align-items:center;gap:.8rem}
.ps-chat-header .info{flex:1}
.ps-chat-header .info h3{font-size:.9rem;margin:0}
.ps-chat-header .info span{font-size:.7rem;color:var(--muted)}
.ps-chat-header .e2e{display:inline-flex;align-items:center;gap:.3rem;background:rgba(30,180,130,.1);color:var(--accent);font-size:.65rem;padding:3px 8px;border-radius:10px}
.ps-chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
.ps-msg-bubble{max-width:75%;padding:.6rem .9rem;border-radius:14px;font-size:.82rem;line-height:1.5;word-break:break-word}
.ps-msg-bubble.sent{align-self:flex-end;background:var(--accent);color:#000;border-bottom-right-radius:4px}
.ps-msg-bubble.received{align-self:flex-start;background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.ps-msg-bubble .sender{font-size:.6rem;font-weight:600;margin-bottom:.2rem;opacity:.7}
.ps-msg-bubble .ts{font-size:.55rem;opacity:.5;margin-top:.2rem;text-align:right}
.ps-chat-input{background:var(--card);border-top:1px solid var(--border);padding:.8rem 1.2rem;display:flex;gap:.6rem;align-items:flex-end}
.ps-chat-input input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.5rem .8rem;color:var(--text);font-family:inherit;font-size:.82rem}
.ps-chat-input input:focus{outline:none;border-color:var(--accent)}
.ps-chat-input button{background:var(--accent);color:#000;border:none;border-radius:10px;padding:.5rem 1rem;font-weight:600;cursor:pointer;font-size:.82rem}
.ps-new-conv-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:.4rem .8rem;font-size:.75rem;cursor:pointer;font-weight:600}
.ps-login-msg{text-align:center;padding:4rem;color:var(--muted)}
.ps-login-msg a{color:var(--accent);text-decoration:none}
.ps-no-convos{text-align:center;padding:2rem;color:var(--muted);font-size:.82rem}
@media(max-width:700px){.ps-msg-layout{grid-template-columns:1fr}.ps-msg-main{display:none}}
</style>
</head>
<body>
<svg style="display:none"><defs><symbol id="pxl" viewBox="0 0 100 100"><polygon points="50,2 93,26 93,74 50,98 7,74 7,26" fill="none"/><polygon points="50,2 93,26 70,14" fill="#2DBD6E"/><polygon points="50,2 70,14 50,30 30,14" fill="#3DC87A"/><polygon points="50,2 30,14 7,26" fill="#1EB482"/><polygon points="93,26 93,74 78,50" fill="#1A9BAF"/><polygon points="93,26 78,50 70,14" fill="#1CB89A"/><polygon points="70,14 78,50 50,30" fill="#22C490"/><polygon points="50,30 78,50 60,72 40,72 22,50" fill="#1A9BAF"/><polygon points="7,26 30,14 22,50" fill="#1565C0"/><polygon points="30,14 50,30 22,50" fill="#1878C8"/><polygon points="7,26 22,50 7,74" fill="#1565C0"/><polygon points="7,74 22,50 40,72 50,98 30,86" fill="#1A9BAF"/><polygon points="93,74 78,50 60,72 50,98 70,86" fill="#1565C0"/><polygon points="50,98 70,86 93,74" fill="#1878C8"/><polygon points="50,98 30,86 7,74" fill="#1A9BAF"/><polygon points="40,72 60,72 50,98 30,86" fill="#1CB89A"/><path d="M36,30 L36,70 L44,70 L44,56 L56,56 Q66,56 66,43 Q66,30 56,30 Z M44,38 L54,38 Q58,38 58,43 Q58,48 54,48 L44,48 Z" fill="white" opacity="0.92"/></symbol></defs></svg>
<nav><a href="/" class="logo"><svg><use href="#pxl"/></svg><div class="logo-text"><strong>Pixel Software Design</strong><span>L'architecture de l'innovation</span></div></a><ul class="nav-menu" id="navMenu"><li><a href="/">Accueil</a></li><li><a href="/social/">Social</a></li><li><a href="/social/messagerie/" class="active">Messagerie</a></li><li><a href="/pixmail/">PixMail</a></li><li><a href="https://pixmaps.web.app/search.html" target="_blank">PixMaps</a></li><li><a href="/portail/" id="navAuth">Connexion</a></li></ul><button class="burger" onclick="document.getElementById('navMenu').classList.toggle('open')" aria-label="Menu"><span></span><span></span><span></span></button></nav>

<div class="ps-msg-layout" id="mainLayout"></div>

<div id="newConvModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center">
<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:400px;width:90%">
<h3 style="margin-bottom:1rem">Nouvelle conversation</h3>
<input type="text" id="convTitle" placeholder="Nom de la conversation" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;color:var(--text);font-size:.82rem;margin-bottom:.8rem">
<input type="text" id="convMembers" placeholder="Destinataire (identifiant)" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem;color:var(--text);font-size:.82rem;margin-bottom:.8rem">
<div style="display:flex;gap:.8rem;justify-content:flex-end">
<button onclick="closeNewConv()" style="background:none;border:1px solid var(--border);color:var(--text);padding:.5rem 1rem;border-radius:8px;cursor:pointer;font-size:.82rem">Annuler</button>
<button onclick="createConv()" class="btn-p" style="font-size:.82rem;padding:.5rem 1rem">Créer</button>
</div>
</div>
</div>

<script>
var S={get:function(k){try{return JSON.parse(localStorage.getItem('pxl_'+k))}catch(e){return null}},set:function(k,v){localStorage.setItem('pxl_'+k,JSON.stringify(v))}};
var session=S.get('session');
var activeConv=null;

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function timeAgo(iso){try{var d=Date.now()-new Date(iso).getTime();var m=Math.floor(d/60000);if(m<1)return 'maintenant';if(m<60)return m+'min';var h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'j'}catch(e){return ''}}
function navAuth(){var n=document.getElementById('navAuth');if(session){n.textContent=session.displayName||session.username;n.href='/portail/'}}

function getConvs(){return S.get('convos')||[]}
function setConvs(c){S.set('convos',c)}
function getMsgs(cid){return S.get('msgs_'+cid)||[]}
function setMsgs(cid,m){S.set('msgs_'+cid,m)}

async function e2eEncrypt(text){
  if(!window.crypto||!window.crypto.subtle)return{text:text,key:'',iv:''};
  try{
    var aesKey=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var encoded=new TextEncoder().encode(text);
    var ciphertext=await crypto.subtle.encrypt({name:'AES-GCM',iv},aesKey,encoded);
    var raw=await crypto.subtle.exportKey('raw',aesKey);
    return{text:btoa(String.fromCharCode(...new Uint8Array(ciphertext))),key:btoa(String.fromCharCode(...new Uint8Array(raw))),iv:btoa(String.fromCharCode(...iv))};
  }catch(e){return{text:text,key:'',iv:''}}
}

async function e2eDecrypt(encText,keyB64,ivB64){
  if(!keyB64||!window.crypto||!window.crypto.subtle)return encText;
  try{
    var ct=Uint8Array.from(atob(encText),function(c){return c.charCodeAt(0)});
    var iv=Uint8Array.from(atob(ivB64),function(c){return c.charCodeAt(0)});
    var raw=Uint8Array.from(atob(keyB64),function(c){return c.charCodeAt(0)});
    var key=await crypto.subtle.importKey('raw',raw,{name:'AES-GCM',length:256},false,['decrypt']);
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    return new TextDecoder().decode(plain);
  }catch(e){return'[Chiffré 🔐]'}
}

function renderLayout(){
  var convos=getConvs();
  var users=JSON.parse(localStorage.getItem('pxl_users')||'{}');
  
  var listHtml='<div class="ps-msg-list-header"><h2>Messages <span class="e2e" style="display:inline-flex;align-items:center;gap:.3rem;background:rgba(30,180,130,.1);color:var(--accent);font-size:.65rem;padding:3px 8px;border-radius:10px">🔐 E2E</span></h2>';
  if(session)listHtml+='<button class="ps-new-conv-btn" onclick="openNewConv()">+ Nouveau</button>';
  listHtml+='</div>';
  
  listHtml+='<div class="ps-msg-list-items">';
  
  if(!session){
    listHtml+='<div class="ps-login-msg"><a href="/login/">Connectez-vous</a> pour accéder à la messagerie.</div>';
  }else{
    listHtml+='<div style="padding:.8rem 1.2rem;border-bottom:1px solid var(--border)"><input type="text" id="searchPeople" placeholder="🔍 Rechercher une personne..." oninput="filterPeople()" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.4rem .6rem;color:var(--text);font-size:.78rem"></div>';
    
    listHtml+='<div id="peopleList">';
    var count=0;
    for(var k in users){
      if(session&&k===session.username)continue;
      var u=users[k];
      var hasConv=false;
      for(var j=0;j<convos.length;j++){if(convos[j].members&&convos[j].members.indexOf(k)>=0){hasConv=true;break}}
      listHtml+='<div class="ps-msg-item people-item" data-username="'+k+'" onclick="startConvWith(\''+k+'\')">';
      listHtml+='<div class="avatar" style="width:38px;height:38px;font-size:.8rem">'+u.displayName[0].toUpperCase()+'</div>';
      listHtml+='<div class="info"><div class="name">'+escHtml(u.displayName)+'</div>';
      listHtml+='<div class="preview" style="font-size:.7rem">@'+k+(hasConv?' · 💬 Conversation existante':' · Cliquer pour discuter')+'</div></div></div>';
      count++;
    }
    listHtml+='</div>';
    if(count===0)listHtml+='<div class="ps-no-convos"><p>Aucun autre utilisateur inscrit</p><p style="font-size:.72rem">Invitez des personnes à s\'inscrire</p></div>';
    
    if(convos.length>0){
      listHtml+='<div style="padding:.6rem 1.2rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:.7rem;color:var(--muted);font-weight:600">💬 CONVERSATIONS</div>';
      for(var i=0;i<convos.length;i++){
        var c=convos[i];
        var msgs=getMsgs(c.id);
        var lastMsg=msgs.length>0?msgs[msgs.length-1].text:'Aucun message';
        var isActive=activeConv&&activeConv.id===c.id;
        listHtml+='<div class="ps-msg-item'+(isActive?' active':'')+'" onclick="openConv(\''+c.id+'\')">';
        listHtml+='<div class="avatar">'+(c.title||'?')[0].toUpperCase()+'</div>';
        listHtml+='<div class="info"><div class="name">'+escHtml(c.title||'Sans titre')+' '+(c.type==='group'?'<span class="type-badge">Groupe</span>':'')+'</div>';
        listHtml+='<div class="preview">'+escHtml(lastMsg.substring(0,40))+'</div>';
        listHtml+='<div class="time">'+timeAgo(c.updatedAt)+'</div></div></div>';
      }
    }
  }
  listHtml+='</div>';
  
  var mainHtml='';
  if(!session){
    mainHtml='<div class="ps-msg-main-empty"><div><div style="font-size:3rem;margin-bottom:1rem">🔐</div><h3>Messagerie de bout en bout</h3><p style="font-size:.82rem;max-width:300px">Connectez-vous pour envoyer des messages chiffrés.</p></div></div>';
  }else if(!activeConv){
    mainHtml='<div class="ps-msg-main-empty"><div><div style="font-size:3rem;margin-bottom:1rem">🔐</div><h3>Messagerie de bout en bout</h3><p style="font-size:.82rem;max-width:300px">Sélectionnez une conversation ou créez-en une nouvelle.<br>Tous les messages sont chiffrés avec AES-256-GCM.</p></div></div>';
  }else{
    mainHtml='<div class="ps-chat-header"><div class="avatar" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#1A9BAF);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#000">'+(activeConv.title||'?')[0].toUpperCase()+'</div>';
    mainHtml+='<div class="info"><h3>'+escHtml(activeConv.title||'Sans titre')+'</h3><span>'+activeConv.members.join(', ')+'</span></div>';
    mainHtml+='<span class="e2e">🔐 Chiffrement de bout en bout</span></div>';
    mainHtml+='<div class="ps-chat-messages" id="chatMessages"></div>';
    mainHtml+='<div class="ps-chat-input"><input id="msgInput" placeholder="Message chiffré..." onkeydown="if(event.key===\'Enter\')sendMsg()"><button onclick="sendMsg()">Envoyer 🔐</button></div>';
  }
  
  document.getElementById('mainLayout').innerHTML='<div class="ps-msg-list">'+listHtml+'</div><div class="ps-msg-main">'+mainHtml+'</div>';
  if(activeConv)renderMessages();
}

async function renderMessages(){
  if(!activeConv)return;
  var msgs=getMsgs(activeConv.id);
  var container=document.getElementById('chatMessages');
  if(!container)return;
  container.innerHTML='';
  for(var i=0;i<msgs.length;i++){
    var m=msgs[i];
    var isMine=m.sender===(session?session.username:'');
    var content=m.text;
    if(!isMine&&m.key){
      content=await e2eDecrypt(m.text,m.key,m.iv);
    }
    var div=document.createElement('div');
    div.className='ps-msg-bubble '+(isMine?'sent':'received');
    div.innerHTML=(!isMine?'<div class="sender">'+escHtml(m.sender)+'</div>':'')+
      '<div>'+escHtml(content)+'</div>'+
      '<div class="ts">'+timeAgo(m.createdAt)+'</div>';
    container.appendChild(div);
  }
  container.scrollTop=container.scrollHeight;
}

async function sendMsg(){
  if(!session||!activeConv)return;
  var input=document.getElementById('msgInput');
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  var encrypted=await e2eEncrypt(text);
  var msgs=getMsgs(activeConv.id);
  msgs.push({id:'m'+Date.now(),sender:session.username,text:encrypted.text,key:encrypted.key,iv:encrypted.iv,createdAt:new Date().toISOString()});
  setMsgs(activeConv.id,msgs);
  var convos=getConvs();
  for(var i=0;i<convos.length;i++){if(convos[i].id===activeConv.id){convos[i].updatedAt=new Date().toISOString();break}}
  setConvs(convos);
  renderMessages();
}

function openConv(id){
  var convos=getConvs();
  for(var i=0;i<convos.length;i++){if(convos[i].id===id){activeConv=convos[i];break}}
  renderLayout();
}

function openNewConv(){document.getElementById('newConvModal').style.display='flex'}
function closeNewConv(){document.getElementById('newConvModal').style.display='none'}

function startConvWith(username){
  if(!session)return;
  var users=JSON.parse(localStorage.getItem('pxl_users')||'{}');
  var target=users[username];
  if(!target)return;
  var convos=getConvs();
  for(var i=0;i<convos.length;i++){
    if(convos[i].members&&convos[i].members.indexOf(username)>=0&&convos[i].members.indexOf(session.username)>=0){
      activeConv=convos[i];renderLayout();return;
    }
  }
  var conv={id:'c'+Date.now(),title:target.displayName||username,type:'private',members:[session.username,username],createdBy:session.username,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  convos.push(conv);setConvs(convos);
  activeConv=conv;renderLayout();
}

function filterPeople(){
  var q=document.getElementById('searchPeople').value.toLowerCase();
  var items=document.querySelectorAll('.people-item');
  for(var i=0;i<items.length;i++){
    var u=items[i].getAttribute('data-username');
    items[i].style.display=u.indexOf(q)>=0?'flex':'none';
  }
}

function createConv(){
  if(!session)return;
  var title=document.getElementById('convTitle').value.trim()||'Conversation';
  var memberStr=document.getElementById('convMembers').value.trim();
  var members=[session.username];
  if(memberStr)members.push(memberStr);
  var convos=getConvs();
  var conv={id:'c'+Date.now(),title:title,type:members.length>2?'group':'private',members:members,createdBy:session.username,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
  convos.push(conv);
  setConvs(convos);
  closeNewConv();
  activeConv=conv;
  renderLayout();
  document.getElementById('convTitle').value='';
  document.getElementById('convMembers').value='';
}

navAuth();renderLayout();
</script>
